name: youtubeplayer
description: Minimal single-page Flutter YouTube player
publish_to: "none"
version: 0.1.17+18

environment:
  sdk: ^3.11.1

dependencies:
  ari_plugin:
    git:
      url: https://github.com/rightsna/ARIAgent.git
      ref: main
      path: ari-framework/plugin
  flutter:
    sdk: flutter
  provider: ^6.1.5+1
  url_launcher: ^6.3.2
  youtube_player_flutter: ^9.1.3
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
