name: youtubeplayer
description: Minimal single-page Flutter YouTube player
publish_to: "none"
version: 0.1.2+3

environment:
  sdk: ^3.8.1

dependencies:
  ari_plugin:
    git:
      url: https://github.com/rightsna/ARIAgent.git
      ref: main
      path: ari-framework/plugin
  flutter:
    sdk: flutter
  provider: ^6.1.2
  url_launcher: ^6.3.2
  youtube_player_flutter: ^9.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
